<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docente</title>
    <link rel="stylesheet" href="/css/Style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<header>Institucion Colegio</header>

<div class="container">
    <div class="card" style="width: 800px;">
        <i class="bi bi-person-workspace icono"></i>
        <h2>Hola Profe</h2>

        <h3>Mis Asignaturas</h3>

        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Hora Inicio</th>
                <th>Hora Fin</th>
                <th>Salon</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="asignatura : ${asignaturas}">
                <td th:text="${asignatura.nombre}"></td>
                <td th:text="${asignatura.horaInicio}"></td>
                <td th:text="${asignatura.horaFin}"></td>
                <td th:text="${asignatura.salon}"></td>
            </tr>
            </tbody>
        </table>

        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Cerrar sesion</button>
        </form>
    </div>
</div>

</body>
</html>
