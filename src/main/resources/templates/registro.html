<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Institución Colegio</title>
    <link rel="stylesheet" href="/css/Style.css">
</head>
<body>

<header>Institución Colegio</header>

<div class="container">
    <div class="card">
        <h2>Registro de Usuario</h2>
        <form th:action="@{/registro}" method="post">
            <!-- El registro también es un POST protegido por CSRF; sin este token Spring lo rechaza. -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Registrarse</button>
        </form>
        <p><a href="/">Volver al login</a></p>
    </div>
</div>

</body>
</html>
